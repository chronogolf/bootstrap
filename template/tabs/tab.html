<li ng-class="[{active: active, disabled: disabled}, classes]" class="uib-tab nav-item" role="presentation">
  <a href
     id="uib-tab-{{index}}"
     role="tab"
     aria-selected="{{active}}"
     aria-controls="uib-tabpanel-{{index}}"
     ng-click="select($event)"
     class="nav-link"
     uib-tab-heading-transclude>{{heading}}</a>
</li>
